# ZO-RLVR Configuration - full parameter mode
# =============================================
# 全パラメータに ZO 摂動を加える（lora_rank: 0）。
# 次元数が非常に大きいため grad_scale のノイズが支配的になりやすい。
# まず zo_rlvr_lora.yaml で動作確認してからこちらを試すことを推奨。
#
# 【lr の設定指針】
# バイナリ報酬では grad_scale = (r+ - r-) / 2ε が最大 1/(2ε) まで達する。
# grad_clip でクリップ後の更新量 ≈ lr * grad_clip * |u|
# full モードでは epsilon を大きめに取るか lr を小さくする必要がある。
#
# Usage:
#   python scripts/train_zo_rlvr.py --config configs/zo_rlvr_full.yaml
#   python scripts/train_zo_rlvr.py --config configs/zo_rlvr_full.yaml --mode measure

model: "Qwen/Qwen2.5-1.5B-Instruct"
gpu: 0
seed: 42

# ZO ハイパーパラメータ
epsilon: 1.0e-2
lr: 1.0e-4          # full モードは lr を小さめに
grad_clip: 1.0
lora_rank: 0        # 0 = 全パラメータ摂動

# ロールアウト設定
batch_size: 4
num_generations: 8
max_new_tokens: 512

# 学習設定
mode: train
max_steps: 200
output_dir: "outputs/zo-rlvr-full"
eval_interval: 20
eval_batch_size: 32

# epsilon 測定設定（--mode measure 時に使用）
epsilons: [1.0e-4, 1.0e-3, 1.0e-2, 1.0e-1]
num_batches: 10
