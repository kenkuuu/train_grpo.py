services:
  grpo-trainer:
    build:
      context: .
      dockerfile: Dockerfile
    image: kubota/grpo-trainer
    container_name: grpo-trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: [ "bash" ]

  train:
    build:
      context: .
      dockerfile: Dockerfile
    image: kubota/grpo-trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - .env
    command: [ "grpo-train", "-c", "/app/configs/default.yaml" ]

  evaluate:
    build:
      context: .
      dockerfile: Dockerfile
    image: kubota/grpo-trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs
      - ./data:/app/data
      - ~/.cache/huggingface:/root/.cache/huggingface
    env_file:
      - .env
    command: [ "grpo-eval", "/app/outputs/grpo-default", "-d", "gsm8k", "-s", "test" ]
